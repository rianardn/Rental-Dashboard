# Fly.io Configuration for PS3 Rental Manager
# Deploy with: fly deploy
# Region: sin (Singapore) for Indonesia users

app = 'ps3-rental-manager'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  DATA_DIR = '/app/data'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = 'ps3_data'
  destination = '/app/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  cpu_kind = 'shared'

[deploy]
  strategy = 'rolling'
  wait_timeout = '2m'
