# Fly.io configuration for PS3 Rental Backend
# Docs: https://fly.io/docs/reference/configuration/

app = 'ps3-rental-backend'
primary_region = 'sin'  # Singapore - change to your preferred region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = '3000'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/ping'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

# Persistent volume for database storage
[[mounts]]
  source = 'ps3_data'
  destination = '/app/data'
  initial_size = '1gb'
